image:
  repository: ghcr.io/mr-nuno/start-page
  tag: "1.1.0"
  pullPolicy: Always

replicas: 1

port: 8080

env:
  TZ: Europe/Stockholm

securityContext:
  runAsUser: 1000

ingress:
  host: start.pew.local
  tls:
    secretName: pew-wildcard-tls

hostPaths:
  thermal: /sys/class/thermal
  hwmon: /sys/class/hwmon
  hostRoot: /
  vault: /home/peter/pew
