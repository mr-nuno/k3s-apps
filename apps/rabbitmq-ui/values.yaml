image:
  repository: ghcr.io/mr-nuno/rabbitmq-ui
  tag: "1.0.5"
  pullPolicy: Always

replicas: 1
port: 80

env:
  TZ: Europe/Stockholm

rabbitmq:
  hostname: "rabbitmq.default.svc.cluster.local"
  url: "http://rabbitmq.default.svc.cluster.local:15672"
  user: "guest"
  pass: "guest"

ingress:
  host: rmq-ui.pew.local
  tls:
    secretName: pew-wildcard-tls
